<!DOCTYPE html>
<html>
<head>
<title>Interview Results</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="center-page">

<div class="card result-card">

<h2>Your Interview Results 🎯</h2>

<!-- OVERALL SCORE -->
<div class="score-circle">
    <h1 id="overallScore">82%</h1>
    <p>Overall Score</p>
</div>

<!-- SKILL BARS -->
<div class="skill">
    <p>Confidence</p>
    <div class="bar"><div id="confBar"></div></div>
</div>

<div class="skill">
    <p>Communication</p>
    <div class="bar"><div id="commBar"></div></div>
</div>

<div class="skill">
    <p>Technical Knowledge</p>
    <div class="bar"><div id="techBar"></div></div>
</div>

<!-- FEEDBACK -->
<div class="feedback">
    <h3>AI Feedback 💬</h3>
    <p>
        Great clarity in answers. Try to give more
        real-world examples to improve impact.
    </p>
</div>

<button class="primary-btn" onclick="goDashboard()">
Go to Dashboard →
</button>

</div>

<script src="script.js"></script>
</body>
</html>
